name: campusvault
description: "CampusVault - AI Powered Smart Learning Platform for Diploma and Engineering Students"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  google_fonts: ^6.0.0
  flutter_animate: ^4.2.0
  lottie: ^3.0.0
  glassmorphism: ^3.0.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  
  # Networking
  dio: ^5.3.0
  http: ^1.1.0
  
  # Authentication
  google_sign_in: ^6.1.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  
  # PDF & Document Handling
  pdf: ^3.10.0
  printing: ^5.11.0
  file_picker: ^6.0.0
  document_file_save_plus: ^4.2.0
  
  # Image & Video
  image_picker: ^1.0.0
  video_player: ^2.8.0
  cached_network_image: ^3.3.0
  
  # Animations & UI
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  permission_handler: ^11.4.3
  
  # JSON Serialization
  json_annotation: ^4.8.0
  
  # Download Manager
  flutter_downloader: ^1.10.4
  
  # Share
  share_plus: ^7.2.0
  
  # Deep Linking
  go_router: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  
  # Fonts
  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/GoogleSans-Medium.ttf
          weight: 500
